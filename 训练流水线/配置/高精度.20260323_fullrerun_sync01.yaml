paths:
  price_dir: 价格数据/原始
  yield_file: 产量数据/原始/产量历史数据.csv
  cost_file: 成本数据/原始/加权平均成本数据.csv
  name_map: 数据/映射/作物名称映射.csv
  env_file: 环境推荐/数据/作物推荐数据.csv
  output_dir: 输出/stage/20260323_fullrerun_sync01
time:
  train_start_year: 2010
  val_years:
  - 2019
  - 2020
  - 2021
  test_years:
  - 2022
  - 2023
  - 2024
  inference_year: 2025
features:
  task_lags:
  - 1
  - 2
  - 3
  - 4
  rolling_windows:
  - 2
  - 3
  - 5
  - 7
  include_cross_task_lags: true
  include_crop_hierarchy: true
  price_include_cross_task_lags: false
  price_include_crop_hierarchy: true
training:
  random_seed: 42
  hpo_trials: 24
  hpo_trials_by_task:
    yield: 40
  base_models:
  - hgb
  - rf
  - etr
  base_models_by_task:
    price:
    - hgb
    - rf
    - etr
    yield:
    - rf
    - etr
    cost:
    - hgb
    - rf
    - etr
    - ridge
  target_transform_by_task:
    price: log1p
    yield: log1p
    cost: none
  recency_weight_alpha_by_task:
    price: 0.8
    yield: 0.6
    cost: 1.1
  cv_objective_weights_by_task:
    price:
      mae: 0.3
      rmse: 0.45
      mape: 0.15
      rank: 0.1
    yield:
      mae: 0.45
      rmse: 0.35
      mape: 0.15
      rank: 0.05
    cost:
      mae: 0.3
      rmse: 0.5
      mape: 0.15
      rank: 0.05
  real_sample_weight: 1.0
  min_crop_rows_for_local_price: 8
  min_crop_rows_for_residual: 2
  enable_residual_correction_by_task:
    yield: true
    cost: false
  bias_calibration_by_task:
    yield:
      mode: power
      per_crop_gamma: true
      objective_weights:
        mae: 0.1
        rmse: 0.15
        mape: 0.75
      ratio_bounds:
      - 0.7
      - 1.3
      factor_bounds:
      - 0.84
      - 1.18
      gamma_max: 1.4
      gamma_step: 0.1
      ratio_shrink_k: 6.0
      gamma_shrink_k: 3.0
  yield_trend_min_crop_val_points: 5
  yield_trend_min_obj_gain: 0.002
  yield_trend_crop_shrink_k: 6.0
  cost_trend_search:
    enabled: true
    trials: 18
    mix_weight_candidates:
    - - 0.35
      - 0.35
      - 0.3
    - - 0.5
      - 0.25
      - 0.25
    - - 0.25
      - 0.5
      - 0.25
    - - 0.25
      - 0.25
      - 0.5
    - - 0.4
      - 0.4
      - 0.2
    - - 0.2
      - 0.4
      - 0.4
    - - 0.4
      - 0.2
      - 0.4
    clip_low_ratio_candidates:
    - 0.55
    - 0.6
    - 0.7
    - 0.8
    clip_high_ratio_candidates:
    - 2.2
    - 2.8
    - 3.2
    recent_yoy_low_candidates:
    - 0.8
    - 0.85
    - 0.9
    recent_yoy_high_candidates:
    - 1.25
    - 1.35
    - 1.45
    q75_yoy_low_candidates:
    - 0.85
    - 0.9
    - 0.95
    q75_yoy_high_candidates:
    - 1.35
    - 1.5
    - 1.65
    sigma_floor_candidates:
    - 0.05
    - 0.08
    - 0.1
    - 0.12
evaluation:
  top_k: 5
  score_search_trials: 300
  run_ablation: false
outputs_lifecycle:
  enabled: true
  dry_run: false
  archive_dir: 输出/stage/20260323_fullrerun_sync01/归档运行
  backup_dir: 输出/stage/20260323_fullrerun_sync01/备份
  keep_latest_runs: 12
  keep_latest_backups: 8
  max_backup_age_days: 30
  require_age_for_backup_delete: false
  snapshot_files:
  - 模型训练报告.json
  - 回测报告.json
  - 推荐结果.csv
  - 高精度训练报告.md
closed_loop:
  auto_build_release: true
  backend_config: 后端/配置.20260323_fullrerun_sync01.yaml
  release_source: training_pipeline_embedded
